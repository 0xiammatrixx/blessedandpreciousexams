<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local Student Result Mailer</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        background: linear-gradient(180deg, #eef4f8 0%, #dbe8ef 100%);
        color: #123;
      }
      main {
        max-width: 980px;
        margin: 0 auto;
        padding: 1rem;
      }
      .card {
        background: #fff;
        border: 1px solid #d3dde3;
        border-radius: 14px;
        padding: 1rem;
        box-shadow: 0 10px 20px rgba(12, 32, 47, 0.08);
      }
      h1 { margin: 0 0 0.35rem; }
      p { margin: 0.25rem 0; }
      .grid {
        margin-top: 1rem;
        display: grid;
        gap: 0.75rem;
      }
      label { font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 0.3rem; }
      textarea, input {
        width: 100%;
        border: 1px solid #c9d5dc;
        border-radius: 10px;
        padding: 0.6rem;
        font: inherit;
      }
      textarea { min-height: 150px; resize: vertical; }
      .actions {
        margin-top: 0.75rem;
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }
      button {
        border: 1px solid transparent;
        border-radius: 10px;
        padding: 0.6rem 0.9rem;
        font-weight: 700;
        cursor: pointer;
      }
      .primary { background: #0b7285; color: #fff; }
      .outline { background: #fff; border-color: #b9c8d2; color: #1d3946; }
      .danger { background: #c92a2a; color: #fff; }
      pre {
        margin: 0;
        background: #f7fbfd;
        border: 1px solid #d2dde4;
        border-radius: 10px;
        padding: 0.7rem;
        white-space: pre-wrap;
        max-height: 340px;
        overflow: auto;
      }
      .status {
        margin-top: 0.65rem;
        padding: 0.55rem 0.7rem;
        border-radius: 8px;
        font-size: 0.9rem;
      }
      .ok { background: #d3f9d8; color: #2b8a3e; }
      .error { background: #ffe3e3; color: #c92a2a; }
      .muted { color: #516a78; font-size: 0.9rem; }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>Local Student Result Mailer</h1>
        <p class="muted">Paste exported emails, create a draft, then send from this local tool.</p>
        <p class="muted">Tip: use the app export button <strong>Export Emails Only CSV</strong>.</p>

        <div class="grid">
          <div>
            <label for="emailsText">Emails (paste CSV content, comma list, or one email per line)</label>
            <textarea id="emailsText" placeholder="email1@example.com, email2@example.com"></textarea>
          </div>

          <div>
            <label for="subject">Email Subject</label>
            <input id="subject" value="Salem Academy CBT Result Update" />
          </div>

          <div>
            <label for="message">Email Message</label>
            <textarea id="message">Hello student,

Your CBT result has been processed.

Your result will be sent before the end of the day.

Regards,
Salem Academy</textarea>
          </div>
        </div>

        <div class="actions">
          <button id="previewBtn" class="outline">Generate Draft Preview</button>
          <button id="sendBtn" class="primary">Send Emails (SMTP)</button>
          <button id="copyBtn" class="outline">Copy Draft</button>
          <button id="clearBtn" class="danger">Clear</button>
        </div>

        <div id="status"></div>

        <div style="margin-top: 0.8rem;">
          <label>Draft Preview</label>
          <pre id="draftOutput">No draft yet.</pre>
        </div>
      </section>
    </main>

    <script>
      const statusEl = document.getElementById('status');
      const draftOutput = document.getElementById('draftOutput');

      function getPayload() {
        return {
          emailsText: document.getElementById('emailsText').value,
          subject: document.getElementById('subject').value,
          message: document.getElementById('message').value,
        };
      }

      function showStatus(message, ok) {
        statusEl.className = `status ${ok ? 'ok' : 'error'}`;
        statusEl.textContent = message;
      }

      async function callApi(path) {
        const response = await fetch(path, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(getPayload()),
        });

        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || 'Request failed');
        }

        return payload;
      }

      document.getElementById('previewBtn').addEventListener('click', async () => {
        try {
          const payload = await callApi('/api/preview');
          draftOutput.textContent = payload.draft;
          showStatus(`Draft ready. Valid emails: ${payload.validCount}. Invalid: ${payload.invalid.length}.`, true);
        } catch (error) {
          showStatus(error.message, false);
        }
      });

      document.getElementById('sendBtn').addEventListener('click', async () => {
        try {
          const payload = await callApi('/api/send');
          showStatus(`Email batch sent. Accepted: ${payload.accepted.length}. Rejected: ${payload.rejected.length}.`, true);
        } catch (error) {
          showStatus(error.message, false);
        }
      });

      document.getElementById('copyBtn').addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(draftOutput.textContent || '');
          showStatus('Draft copied to clipboard.', true);
        } catch {
          showStatus('Could not copy draft. Copy manually from preview box.', false);
        }
      });

      document.getElementById('clearBtn').addEventListener('click', () => {
        document.getElementById('emailsText').value = '';
        draftOutput.textContent = 'No draft yet.';
        statusEl.className = '';
        statusEl.textContent = '';
      });
    </script>
  </body>
</html>
